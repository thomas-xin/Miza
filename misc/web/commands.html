	<!-- Open Graph Meta Tags -->

	<link rel="icon" type="image/png" href="/assets/images/logo512.webp">
	<link rel="stylesheet" href="/assets/css/global.css">
	<script defer="defer" src="/assets/js/global.js"></script>

	<!-- Page specific: -->
	<title>Atlas: Miza</title>
	<meta content="#FF7FBF" data-react-helmet="true" name="theme-color">
	<link rel="stylesheet" href="/assets/css/commands.css">
	<script defer="defer" src="/assets/js/commands.js"></script>
</head>
<body>
	<div id="root">
		<nav id="navigation-links" class="hideext">
			<a class="nav-ref" href="/">Home</a>
			<a class="nav-ref" href="/commands">Commands</a>
			<span class="nav-dropdown">
				Tools
				<span></span>
				<div>
					❥ <a class="nav-ref" href="/files">Filehost</a><br />
					❥ <a class="nav-ref" href="/downloader">Media Downloader</a>
				</div>
			</span>
			<a class="nav-link" href="https://www.github.com/thomas-xin/miza" target="_blank" rel="noopener">Source</a>
			<a class="nav-link" href="https://discord.gg/cbKQKAr" target="_blank" rel="noopener">Support</a>
			<a class="nav-link" href="https://ko-fi.com/mizabot" target="_blank" rel="noopener">Premium</a>
			<a class="nav-link" href="https://github.com/thomas-xin/Miza/wiki/Terms-of-Service" target="_blank" rel="noopener">ToS</a>
		</nav>
		<template id="command-short-description">
			<div class="command-body-short">
				<p class="description"></p>
			</div>
		</template>
		<template id="command-body">
			<div class="command-body">
				<div class="side">
					<p class="aka">[[ aka <span class="cmd-aka">[list]</span> ]]</p>
					<p class="description"></p>
					<ul class="stats">
						<dl role="listitem">
							<dd class="required-level"></dd>
							<dt>Required level</dt>
						</dl>
						<dl role="listitem">
							<dd class="rate-limit"></dd>
							<dt>Rate limit</dt>
						</dl>
						<dl role="listitem">
							<dd class="exec-timeout"></dd>
							<dt>Max execution time</dt>
						</dl>
					</ul>
					<br>
					<h2 class="usage-head">Usage</h2>
					<div class="usage-str"></div>
					<h3 class="examples-head">Examples</h3>
					<ul class="example-commands"></ul>
					<h3 class="macros-head">Shortcut Commands</h3>
					<ul class="macros"></ul>
				</div>
				<div class="side">
					<h3 class="args-head">Arguments</h3>
					<ol class="arguments"></ol>
				</div>
			</div>
		</template>
		<section class="commands-index">
			<a id="go-back-link" class="hideext"></a>
			<h1>Commands</h1>
			<ul id="categories" class="hideext">Loading...</ul>
			<div id="command"></div>
		</section>
		<footer>
			Website created by&nbsp;<a href="https://github.com/hucario" target="_blank" class="hideext">Hucario</a>. Have a great day :)
		</footer>
	</div>
</body>
