<!DOCTYPE html>
<html lang="en">
<head>
	<!-- PROPOSE: A multipurpose Discord bot -->

	<meta charset="utf-8">
	<meta name="description" content="Your local loyal multipurpose Discord bot.">

	<!-- Open Graph Meta Tags -->
	<meta property="og:url" content="https://mizabot.xyz">
	<meta property="og:type" content="website">
	<meta property="og:title" content="Media Downloader">
	<meta property="og:description" content="General purpose media downloader and converter">
	<meta property="og:image" content="https://mizabot.xyz/assets/images/mizaleaf.webp">

	<link rel="icon" type="image/webp" href="/assets/images/mizaleaf.webp">
	<link rel="stylesheet" href="/assets/css/global.css">
	<script defer="defer" src="/assets/js/global.js"></script>

	<!-- Page specific: -->
	<title>Downloader: Miza</title>
	<meta content="#FF7FBF" data-react-helmet="true" name="theme-color">
	<link rel="stylesheet" href="/assets/css/downloader.css">
	<link href='https://fonts.googleapis.com/css?family=Agbalumo' rel='stylesheet'>
	<script defer="defer" src="/assets/js/downloader.js"></script>
</head>
<body>
	<div id="root">
		<nav id="navigation-links" class="hideext">
			<a class="nav-ref" href="/">Home</a>
			<a class="nav-ref" href="/commands">Commands</a>
			<span class="nav-dropdown">
				Tools
				<span></span>
				<div>
					❥ <a class="nav-ref" href="/files">Filehost</a><br />
					❥ <a class="nav-ref" href="/downloader">Media Downloader</a>
				</div>
			</span>
			<a class="nav-link" href="https://www.github.com/thomas-xin/miza" target="_blank" rel="noopener">Source</a>
			<a class="nav-link" href="https://discord.gg/cbKQKAr" target="_blank" rel="noopener">Support</a>
			<a class="nav-link" href="https://ko-fi.com/mizabot" target="_blank" rel="noopener">Premium</a>
			<a class="nav-link" href="https://github.com/thomas-xin/Miza/wiki/Terms-of-Service" target="_blank" rel="noopener">ToS</a>
		</nav>
		<div id="main">
			<h1>Download Media</h1>
			<div class="container">
				<div>
					<h3>Name or URL</h3>
					<input type="text" id="query" style="min-width:320px; width:60vw; font-size: 24px; font-family: Agbalumo, cursive, sans-serif" oninput="debouncedSearch()" onchange="debouncedSearch()" value="" required>

					<h3>Format</h3>
					<div style="color: #FFFFFF">
						<hr>
						<span class="format-category">Multimedia</span>
						<div class="format-container">
							<label for="mp4"><input type="radio" id="mp4" name="output-format" value="mp4" checked>mp4</label>
							<label for="mkv"><input type="radio" id="mkv" name="output-format" value="mkv">mkv</label>
							<label for="webm"><input type="radio" id="webm" name="output-format" value="webm">webm</label>
							<label for="h264"><input type="radio" id="h264" name="output-format" value="h264">h264</label>
							<label for="h265"><input type="radio" id="h265" name="output-format" value="h265">h265</label>
							<label for="h266"><input type="radio" id="h266" name="output-format" value="h266">h266</label>
							<label for="av1"><input type="radio" id="av1" name="output-format" value="av1">av1</label>
						</div>
						<hr>
						<span class="format-category">Picture Only</span>
						<div class="format-container">
							<label for="avif"><input type="radio" id="avif" name="output-format" value="avif">avif</label>
							<label for="webp"><input type="radio" id="webp" name="output-format" value="webp">webp</label>
							<label for="gif"><input type="radio" id="gif" name="output-format" value="gif">gif</label>
						</div>
						<hr>
						<span class="format-category">Audio Only</span>
						<div class="format-container">
							<label for="opus"><input type="radio" id="opus" name="output-format" value="opus">opus</label>
							<label for="ogg"><input type="radio" id="ogg" name="output-format" value="ogg">ogg</label>
							<label for="mp3"><input type="radio" id="mp3" name="output-format" value="mp3">mp3</label>
						</div>
					</div>
				</div>
			</div>
			<div id="previews" class="container" style="display:none">
			</div>
			<button id="submit" onclick="downloadAll()">
				<span>Download</span>
				<div class="progress-bar"></div>
			</button>
			<span id="text-measure" style="position:absolute; visibility:hidden; white-space:pre"></span>
		</div>
	</div>
</body>
</html>
