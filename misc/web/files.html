<!DOCTYPE html>
<html lang="en">
<head>
	<!-- PROPOSE: A multipurpose Discord bot -->

	<meta charset="utf-8">
	<meta name="description" content="Your local loyal multipurpose Discord bot.">

	<!-- Open Graph Meta Tags -->
	<meta property="og:url" content="https://mizabot.xyz">
	<meta property="og:type" content="website">
	<meta property="og:title" content="Miza">
	<meta property="og:description" content="A multipurpose Discord bot.">
	<meta property="og:image" content="https://mizabot.xyz/logo512.webp">

	<!-- Twitter Meta Tags -->
	<meta name="twitter:card" content="summary_large_image">
	<meta property="twitter:domain" content="mizabot.xyz">
	<meta property="twitter:url" content="https://mizabot.xyz">
	<meta name="twitter:title" content="Miza">
	<meta name="twitter:description" content="A multipurpose Discord bot.">
	<meta name="twitter:image" content="https://mizabot.xyz/logo512.webp">

	<link rel="icon" type="image/png" href="/assets/images/logo512.webp">
	<link rel="stylesheet" href="/assets/css/global.css">
	<script defer="defer" src="/assets/js/global.js"></script>

	<!-- Page specific: -->
	<title>Files: Miza</title>
	<link rel="stylesheet" href="/assets/css/files.css">
	<script defer="defer" src="/assets/js/files.js"></script>
</head>
<body>
	<div id="root">
		<nav id="navigation-links" class="hideext">
			<a href="/">Home</a>
			<a href="/commands">Commands</a>
			<a href="/files">Files</a>
			<a href="https://www.github.com/thomas-xin/miza" target="_blank" rel="noopener">Source</a>
			<a href="https://discord.gg/cbKQKAr" target="_blank" rel="noopener">Support</a>
			<a href="https://ko-fi.com/mizabot" target="_blank" rel="noopener">Premium</a>
			<a href="https://github.com/thomas-xin/Miza/wiki/Terms-of-Service" target="_blank" rel="noopener">ToS</a>
		</nav>
		<div class="swapping-sections-holder">
			<section class="file-upload">
				<div class="progress-element"></div>
				<h1 id="uploadH1">File upload</h1>
				<h2 id="uploadProgressH2">0% complete</h2>
				<form>
					<label class="file-input">
						<input type="file" class="screen-reader-only" name="file" required>
						<span class="filename-text">
							Choose a file...
						</span>
						<span class="file-browse-button">
							Browse
						</span>
					</label>
					<label class="checkbox-label">
						<input type="checkbox" name="keep" value="true">
						Store file permanently
					</label>
					<button type="submit">
						Upload
					</button>
				</form>
			</section>
			<section class="file-preview">
				<h1>File Preview</h1>
				<a class="permalink" target="_blank" rel="noreferrer noopener"></a>
				<div class="media-preview-holder"></div>
				<code class="metadata"></code>
				<div class="buttonsRow hideext">
					<a class="linkButton" id="view-raw">View raw</a>
					<a class="linkButton" id="download" download>Download</a>
					<a class="linkButton" href="/files">Upload another</a>
				</div>
			</section>
		</div>
		<footer>
			Website created by&nbsp;<a href="https://github.com/hucario" target="_blank" class="hideext">Hucario</a>. Have a great day :)
		</footer>
	</div>
</body>
</html>
