<!DOCTYPE html>
<html lang="en">
<head>
	<!-- PROPOSE: A multipurpose Discord bot -->

	<meta charset="utf-8">
	<meta name="description" content="Your local loyal multipurpose Discord bot.">

	<!-- Open Graph Meta Tags -->
	<meta property="og:url" content="https://mizabot.xyz">
	<meta property="og:type" content="website">
	<meta property="og:title" content="Filehost">
	<meta property="og:description" content="Backup and share files here!">
	<meta property="og:image" content="https://mizabot.xyz/assets/images/mizaleaf.webp">

	<link rel="icon" type="image/png" href="/assets/images/mizaleaf.webp">
	<link rel="stylesheet" href="/assets/css/global.css">
	<script defer="defer" src="/assets/js/global.js"></script>

	<!-- Page specific: -->
	<title>Files: Miza</title>
	<meta content="#FF7FBF" data-react-helmet="true" name="theme-color">
	<link rel="stylesheet" href="/assets/css/files.css">
	<script defer="defer" src="/assets/js/files.js"></script>
</head>
<body>
	<div id="root">
		<nav id="navigation-links" class="hideext">
			<a class="nav-ref" href="/">Home</a>
			<a class="nav-ref" href="/commands">Commands</a>
			<span class="nav-dropdown">
				Tools
				<span></span>
				<div>
					❥ <a class="nav-ref" href="/files">Filehost</a><br />
					❥ <a class="nav-ref" href="/downloader">Media Downloader</a>
				</div>
			</span>
			<a class="nav-link" href="https://www.github.com/thomas-xin/miza" target="_blank" rel="noopener">Source</a>
			<a class="nav-link" href="https://discord.gg/cbKQKAr" target="_blank" rel="noopener">Support</a>
			<a class="nav-link" href="https://ko-fi.com/mizabot" target="_blank" rel="noopener">Premium</a>
			<a class="nav-link" href="https://github.com/thomas-xin/Miza/wiki/Terms-of-Service" target="_blank" rel="noopener">ToS</a>
		</nav>
		<div class="swapping-sections-holder">
			<section class="file-upload">
				<div class="progress-element"></div>
				<h1 id="uploadH1" style="color: #FCF430">File upload</h1>
				<h2 id="uploadProgressH2">0% complete</h2>
				<form>
					<label class="file-input">
						<input type="file" class="screen-reader-only" name="file" required>
						<span class="filename-text">
							Choose a file...
						</span>
						<span class="file-browse-button">
							Browse
						</span>
					</label>
					<label class="checkbox-label" style="color: #9C59D1">
						<input type="checkbox" name="keep" value="true">
						Store file permanently
					</label>
					<button type="submit">
						Upload
					</button>
				</form>
			</section>
			<section class="file-preview">
				<h1 style="color: #FCC000">File Preview</h1>
				<a class="permalink" target="_blank" rel="noreferrer noopener"></a>
				<div class="media-preview-holder"></div>
				<code class="metadata"></code>
				<div class="buttonsRow hideext">
					<a class="linkButton" id="view-raw" style="background-color: #00A0E4; border: 2px #005072">View raw</a>
					<a class="linkButton" id="download" style="background-color: #E60050; border: 2px #730028" download>Download</a>
					<a class="linkButton" href="/files" style="background-color: #310444; border: 2px #190222">Upload another</a>
				</div>
			</section>
		</div>
		<footer>
			Website created by&nbsp;<a href="https://github.com/hucario" target="_blank" class="hideext">Hucario</a>. Have a great day :)
		</footer>
	</div>
</body>
</html>
